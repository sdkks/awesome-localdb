name: Test Examples

on:
  push:
    branches: [main]
    paths:
      - 'databases/**'
      - '.github/workflows/test-examples.yml'
  pull_request:
    paths:
      - 'databases/**'
      - '.github/workflows/test-examples.yml'

jobs:
  # ─── Python examples ──────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db:
          - sqlite/python
          - duckdb/python
          - rocksdb/python
          - lancedb/python
          - tinydb/python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: databases/${{ matrix.db }}
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: databases/${{ matrix.db }}
        run: python -m pytest -v

  # ─── Rust examples ────────────────────────────────────────────────
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db:
          - sqlite/rust
          - rocksdb/rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Run tests
        working-directory: databases/${{ matrix.db }}
        run: cargo test
