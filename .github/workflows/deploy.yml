name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'databases/**/metadata.json'
      - '.github/workflows/deploy.yml'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Build index
        run: bash scripts/build-index.sh

      # Caching strategy:
      # - CSS/JS/favicon are immutable once deployed. For better cache hit
      #   rates, version asset filenames with a content hash (e.g. base.a1b2c3d.css)
      #   so that new deploys bust the CDN cache. GitHub Pages serves static
      #   assets with Cache-Control: max-age=600 by default; consider using a
      #   custom domain with Cloudflare or Netlify for finer cache-control headers.

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
