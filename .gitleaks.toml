title = "Awesome Local DB gitleaks config"

[allowlist]
description = "Global allowlist"
paths = [
  '''site/index.json''',
  '''site/filter-options.json''',
  '''browse-view-clear.png''',
  '''desktop-1280px.png''',
  '''phone-480px.png''',
  '''sidebar-tags.png''',
  '''tablet-768px.png''',
  '''phone-480px-snapshot.yml''',
  '''tablet-768px-snapshot.yml''',
]
